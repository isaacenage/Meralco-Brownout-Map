name: Scrape Meralco rotational brownout schedule

on:
  # Every 3 hours, aligned to Philippine midnight (UTC+8).
  # PHT  00:00 03:00 06:00 09:00 12:00 15:00 18:00 21:00
  # UTC  16:00 19:00 22:00 01:00 04:00 07:00 10:00 13:00
  schedule:
    - cron: "0 1,4,7,10,13,16,19,22 * * *"
  # Allow manual runs from the Actions tab too.
  workflow_dispatch:

permissions:
  contents: write

env:
  # Opt into Node 24 for JavaScript-based actions (checkout, setup-node).
  # Node 20 is deprecated on GitHub runners; forced default 2026-06-02, removed 2026-09-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run scraper
        run: npm run scrape

      - name: Commit updated schedule (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -z "$(git status --porcelain public/data)" ]]; then
            echo "No changes to commit."
            exit 0
          fi
          git add public/data
          git commit -m "chore(scrape): update schedule $(date -u +%Y-%m-%d)"
          git push
