name: Scrape Meralco maintenance schedule

on:
  # Every 6 hours on PHT half-hours (UTC+8). Maintenance announcements roll
  # in throughout the day; quarterly polling is plenty.
  # PHT 02:30 08:30 14:30 20:30
  # UTC 18:30 00:30 06:30 12:30
  schedule:
    - cron: "30 0,6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements-maintenance.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-maintenance.txt

      - name: Run maintenance scraper
        run: python scripts/scrape_maintenance.py

      - name: Commit updated maintenance schedule (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -z "$(git status --porcelain public/data/maintenance)" ]]; then
            echo "No changes to commit."
            exit 0
          fi
          git add public/data/maintenance
          git commit -m "chore(scrape): update maintenance schedule $(date -u +%Y-%m-%d)"
          git push
